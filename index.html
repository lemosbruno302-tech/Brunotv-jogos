<!DOCTYPE html><html>
<head>
<meta charset="UTF-8">
<title>BrunoTV Jogos</title>
<style>
body{
background:#000;
color:#fff;
font-family:Arial;
padding:20px;
}
.card{
background:#111;
padding:15px;
margin-bottom:10px;
border-left:4px solid red;
border-radius:10px;
}
</style>
</head>
<body><h1>⚽ BrunoTV Jogos</h1><div id="jogos">Carregando...</div><script>

async function carregarJogos(){

try{

const resposta = await fetch(
"https://www.thesportsdb.com/api/v1/json/123/search_all_leagues.php?s=Soccer"
);

const dados = await resposta.json();

let html = "";

dados.countries.forEach(liga => {

html += `
<div class="card">
🏆 ${liga.strLeague}
</div>
`;

});

document.getElementById("jogos").innerHTML = html;

}catch(e){

document.getElementById("jogos").innerHTML =
"Erro: " + e.message;

}

}

carregarJogos();

</script></body>
</html>
