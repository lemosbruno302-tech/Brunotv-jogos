<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BrunoTV Sports Premium</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#050505;
color:#fff;
}

header{
background:#111;
padding:20px;
text-align:center;
border-bottom:3px solid #ff0000;
}

h1{
color:#ff0000;
}

#jogos{
padding:15px;
}

.card{
background:#111;
border-radius:15px;
padding:15px;
margin-bottom:15px;
border-left:5px solid #ff0000;
box-shadow:0 0 10px rgba(255,0,0,.2);
}

.liga{
color:#ff5555;
font-weight:bold;
margin-bottom:10px;
}

.times{
display:flex;
justify-content:space-between;
align-items:center;
font-size:18px;
font-weight:bold;
}

.escudo{
width:40px;
height:40px;
object-fit:contain;
}

.hora{
margin-top:10px;
color:#ccc;
}

.live{
display:inline-block;
background:red;
padding:5px 10px;
border-radius:20px;
font-size:12px;
margin-bottom:10px;
}

.erro{
text-align:center;
padding:30px;
color:#ff5555;
}
</style>
</head>
<body>

<header>
<h1>⚽ BrunoTV Sports</h1>
<p>Jogos do Dia</p>
</header>

<div id="jogos">
Carregando partidas...
</div>

<script>

const API_KEY = "SUA_CHAVE_API";

async function carregarJogos(){

try{

const hoje = new Date().toISOString().split('T')[0];

const resposta = await fetch(
`https://v3.football.api-sports.io/fixtures?date=${hoje}`,
{
headers:{
"x-apisports-key": API_KEY
}
}
);

const dados = await resposta.json();

const container = document.getElementById("jogos");

container.innerHTML = "";

if(!dados.response || dados.response.length === 0){
container.innerHTML =
'<div class="erro">Nenhum jogo encontrado.</div>';
return;
}

dados.response.forEach(jogo => {

container.innerHTML += `

<div class="card">

<div class="liga">
🏆 ${jogo.league.name}
</div>

${jogo.fixture.status.short === "LIVE" ?
'<div class="live">🔴 AO VIVO</div>' : ''}

<div class="times">

<div>
<img class="escudo" src="${jogo.teams.home.logo}">
<br>
${jogo.teams.home.name}
</div>

<div>VS</div>

<div>
<img class="escudo" src="${jogo.teams.away.logo}">
<br>
${jogo.teams.away.name}
</div>

</div>

<div class="hora">
🕒 ${new Date(jogo.fixture.date).toLocaleTimeString('pt-BR')}
</div>

</div>

`;

});

}catch(erro){

document.getElementById("jogos").innerHTML =
'<div class="erro">Erro ao carregar jogos.</div>';

console.log(erro);

}

}

carregarJogos();

</script>

</body>
</html>
